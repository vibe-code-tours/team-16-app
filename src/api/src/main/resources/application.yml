server:
  port: ${PORT:8080}

logging:
  level:
    com.nerdquiz.config.JwtAuthenticationFilter: DEBUG
    com.nerdquiz.config.JwtUtil: DEBUG

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:54322/postgres?user=postgres&password=postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

#app:
#  cors:
#    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5100,http://localhost:5173,http://localhost:3000,https://nerdquiz-16.netlify.app}

# Supabase JWT configuration
supabase:
  url: ${SUPABASE_URL:http://localhost:54321}
  anon-key: ${SUPABASE_ANON_KEY:}
