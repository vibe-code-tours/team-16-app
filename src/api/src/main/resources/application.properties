# NerdQuiz API — Application Configuration

# Server
server.port=8080

# Supabase
supabase.url=${SUPABASE_URL:http://localhost:54321}
supabase.anon-key=${SUPABASE_ANON_KEY:}

# Spring
spring.application.name=nerdquiz-api

# Rate limiting (per-IP, sliding window)
security.rate-limit.max-requests=60
security.rate-limit.window-seconds=60

# Payload size limits
server.tomcat.max-http-form-post-size=102400
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
