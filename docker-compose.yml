# ── Backend only ──────────────────────────────────────────────
# Frontend deploys to Netlify (see netlify.toml).
# This file is for running the Spring Boot backend in Docker.
#
# Usage:
#   docker compose up                    # start backend on http://localhost:8080
#   docker compose up -d                 # start in background
#   docker compose down                  # stop
#
# Requires a running Postgres instance (Supabase CLI or external).
# The backend connects to the database via DATABASE_URL.
services:
  backend:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL:-jdbc:postgresql://localhost:54322/postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - SUPABASE_URL=${SUPABASE_URL:?Set SUPABASE_URL in .env (e.g. https://<ref>.supabase.co)}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY in .env}
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3
