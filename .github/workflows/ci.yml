name: ci
# Progressive CI for team projects. Safe on any stack: every step is guarded, so a
# fresh repo stays GREEN until you add the matching script/deps — then the check
# starts enforcing. No wall of red on day one.
#
# Enforcement is controlled by BRANCH PROTECTION, not this file:
#   ch-6  -> check runs, NOT required (advisory)
#   ch-8  -> mark the `ci` check "required" in the ruleset (blocks merge on red)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Kill superseded runs on the same branch/PR (saves Actions minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest      # never windows/macos — they bill 2x / 10x
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # ---------- Node / TypeScript (runs only if src/web/package.json exists) ----------
      - name: Setup Node
        if: ${{ hashFiles('src/web/package.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "src/web/package-lock.json"
      - name: Install (Node)
        if: ${{ hashFiles('src/web/package.json') != '' }}
        working-directory: src/web
        run: npm ci || npm install
      - name: Lint
        if: ${{ hashFiles('src/web/package.json') != '' }}
        working-directory: src/web
        run: npm run lint --if-present
      - name: Typecheck
        if: ${{ hashFiles('src/web/package.json') != '' }}
        working-directory: src/web
        run: npm run typecheck --if-present
      - name: Test
        if: ${{ hashFiles('src/web/package.json') != '' }}
        working-directory: src/web
        run: npm test --if-present
      - name: Build
        if: ${{ hashFiles('src/web/package.json') != '' }}
        working-directory: src/web
        run: npm run build --if-present

      # ---------- Java / Spring Boot (runs only if src/api/build.gradle exists) ----------
      - name: Setup Java
        if: ${{ hashFiles('src/api/build.gradle') != '' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - name: Build & Test (Gradle)
        if: ${{ hashFiles('src/api/build.gradle') != '' }}
        working-directory: src/api
        run: ./gradlew build
