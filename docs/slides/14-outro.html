<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Slide 14 — Outro: Aung Is Ready</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: radial-gradient(ellipse at center, #1a1040, var(--bg-deep) 70%); }
    .outro-scene { width: 100%; height: 100%; position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .constellation-3d { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 800px; height: 200px; }
    .const-star { position: absolute; font-size: 28px; opacity: 0; }
    .const-star:nth-child(1) { top: 20px; left: 100px; animation: scale-in-bounce 0.5s ease-out 0.3s forwards, float 4s ease-in-out 0.8s infinite; }
    .const-star:nth-child(2) { top: 60px; left: 250px; animation: scale-in-bounce 0.5s ease-out 0.5s forwards, float 4s ease-in-out 1.0s infinite; font-size: 22px; }
    .const-star:nth-child(3) { top: 30px; left: 400px; animation: scale-in-bounce 0.5s ease-out 0.7s forwards, float 4s ease-in-out 1.2s infinite; }
    .const-star:nth-child(4) { top: 80px; left: 550px; animation: scale-in-bounce 0.5s ease-out 0.9s forwards, float 4s ease-in-out 1.4s infinite; font-size: 24px; }
    .const-star:nth-child(5) { top: 40px; left: 680px; animation: scale-in-bounce 0.5s ease-out 1.1s forwards, float 4s ease-in-out 1.6s infinite; font-size: 20px; }
    .const-line { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, rgba(167,139,250,0.3), transparent); opacity: 0; animation: fade-in-up 0.6s ease-out forwards; }
    .const-line:nth-child(6) { width: 120px; top: 40px; left: 150px; transform: rotate(15deg); animation-delay: 1.3s; }
    .const-line:nth-child(7) { width: 140px; top: 50px; left: 300px; transform: rotate(-10deg); animation-delay: 1.5s; }
    .const-line:nth-child(8) { width: 130px; top: 55px; left: 460px; transform: rotate(20deg); animation-delay: 1.7s; }
    .const-line:nth-child(9) { width: 110px; top: 65px; left: 600px; transform: rotate(-5deg); animation-delay: 1.9s; }
    .aung-stand { width: 120px; height: 240px; background: linear-gradient(180deg, rgba(124,58,237,0.4), rgba(124,58,237,0.1)); border-radius: 60px 60px 30px 30px; position: relative; margin-bottom: 20px; opacity: 0; animation: fade-in-up 1s ease-out 0.5s forwards; }
    .aung-stand::before { content: '🧑‍💻'; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 48px; }
    .aung-stand::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 160px; height: 10px; background: radial-gradient(ellipse, rgba(124,58,237,0.3), transparent 70%); border-radius: 50%; animation: pulse-glow 3s ease-in-out infinite; }
    .final-logo { font-family: 'Space Grotesk', sans-serif; font-size: 96px; font-weight: 800; background: linear-gradient(135deg, var(--purple-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; z-index: 10; opacity: 0; animation: scale-in-bounce 0.8s ease-out 1.0s forwards; }
    .tagline { font-size: 24px; color: var(--text-secondary); margin-bottom: 8px; z-index: 10; opacity: 0; }
    .tagline:nth-child(1) { animation: fade-in-up 0.6s ease-out 1.4s forwards; }
    .tagline:nth-child(2) { animation: fade-in-up 0.6s ease-out 1.6s forwards; }
    .burmese-final { font-size: 32px; color: var(--burmese); margin-top: 16px; z-index: 10; opacity: 0; animation: fade-in-up 0.6s ease-out 1.8s forwards; }
    .github-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; padding: 10px 24px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 16px; color: var(--text-secondary); text-decoration: none; z-index: 10; opacity: 0; transition: all 0.3s; }
    .github-link { animation: fade-in-up 0.6s ease-out 2.0s forwards; }
    .github-link:hover { border-color: var(--purple-light); color: var(--text-primary); transform: translateY(-2px); box-shadow: 0 4px 20px var(--purple-glow); }
    /* Rising sparkle particles */
    .sparkle { position: absolute; width: 4px; height: 4px; background: var(--purple-light); border-radius: 50%; opacity: 0; animation: particle-rise 3s ease-out infinite; }
    .sparkle:nth-child(1) { left: 45%; bottom: 200px; animation-delay: 1.5s; }
    .sparkle:nth-child(2) { left: 50%; bottom: 180px; animation-delay: 2.0s; background: var(--gold); width: 3px; height: 3px; }
    .sparkle:nth-child(3) { left: 55%; bottom: 220px; animation-delay: 2.5s; width: 5px; height: 5px; }
    .sparkle:nth-child(4) { left: 48%; bottom: 160px; animation-delay: 3.0s; background: var(--green); }
    .sparkle:nth-child(5) { left: 52%; bottom: 240px; animation-delay: 3.5s; width: 3px; height: 3px; }
    .sparkle:nth-child(6) { left: 47%; bottom: 190px; animation-delay: 4.0s; background: var(--gold); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="dots-overlay"></div>
    <div class="slide-number anim-fade-in-down delay-1">SCENE 14 / 14</div>
    <div class="outro-scene">
      <!-- Rising sparkles -->
      <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
      <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
      <div class="constellation-3d">
        <div class="const-star">💻</div><div class="const-star">🔒</div><div class="const-star">📊</div><div class="const-star">🎯</div><div class="const-star">💼</div>
        <div class="const-line"></div><div class="const-line"></div><div class="const-line"></div><div class="const-line"></div>
      </div>
      <div class="aung-stand"></div>
      <div class="final-logo">NerdQuiz</div>
      <div class="tagline" style="opacity:0;">Built by 8 developers in 2 weeks</div>
      <div class="tagline" style="font-size:18px;color:var(--text-muted);opacity:0;">Powered by AI · React · Spring Boot · Supabase</div>
      <div class="burmese-final">ကျေးဇူးတင်ပါတယ်</div>
      <a class="github-link" href="#"><span style="font-size:20px;">📦</span>View on GitHub</a>
    </div>
    <div class="glow-orb orb-purple animate-glow-pulse" style="width:500px;height:500px;top:-150px;left:50%;transform:translateX(-50%);"></div>
    <div class="glow-orb orb-gold animate-glow-pulse" style="width:300px;height:300px;bottom:-100px;left:200px;animation-delay:2s;"></div>
    <div class="glow-orb orb-green animate-glow-pulse" style="width:250px;height:250px;bottom:-80px;right:200px;animation-delay:3s;"></div>
    <div class="slide-footer"><span class="slide-footer-text">5:55 – 6:00</span><span class="slide-footer-logo">NerdQuiz</span></div>
  </div>
</body>
</html>
