name: deploy-backend

# Deploy Spring Boot API to Google Cloud Run on push to main.
# Only triggers when backend source files change.

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - "docker-compose.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: nerdquiz-api
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nerdquiz-api/nerdquiz-api

jobs:
  deploy:
    name: deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository if needed
        run: |
          gcloud artifacts repositories describe nerdquiz-api \
            --location=$REGION --project=$PROJECT_ID >/dev/null 2>&1 || \
          gcloud artifacts repositories create nerdquiz-api \
            --repository-format=docker \
            --location=$REGION \
            --project=$PROJECT_ID

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE:${{ github.sha }} ./src/api
          docker push $IMAGE:${{ github.sha }}

      - name: Write env-vars file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [[ "$DATABASE_URL" != jdbc:postgresql://*.pooler.supabase.com:5432/* ]]; then
            echo "::error::DATABASE_URL must be the Supabase session-pooler JDBC URL on port 5432 (the direct db.* host is IPv6-only)."
            exit 1
          fi
          if [[ "$DB_USER" != postgres.* || -z "$DB_PASSWORD" ]]; then
            echo "::error::DB_USER must be the pooler user (postgres.<project-ref>) and DB_PASSWORD must be set."
            exit 1
          fi
          node -e 'require("fs").writeFileSync("/tmp/env-vars", JSON.stringify({
            DATABASE_URL: process.env.DATABASE_URL,
            DB_USER: process.env.DB_USER,
            DB_PASSWORD: process.env.DB_PASSWORD,
            SUPABASE_URL: process.env.SUPABASE_URL,
            SUPABASE_ANON_KEY: process.env.SUPABASE_ANON_KEY
          }))'
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --allow-unauthenticated \
            --env-vars-file /tmp/env-vars
