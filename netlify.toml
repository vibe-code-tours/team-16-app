# Netlify configuration for NerdQuiz frontend.
# Build happens in GitHub Actions; this file configures SPA routing.

# SPA fallback — all routes serve index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Ensure JavaScript modules are served with correct MIME type
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
