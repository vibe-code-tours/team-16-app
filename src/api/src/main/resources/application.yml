server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:54322/postgres?user=postgres&password=postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Supabase JWT configuration
supabase:
  url: ${SUPABASE_URL:http://localhost:54321}
  anon-key: ${SUPABASE_ANON_KEY:}
