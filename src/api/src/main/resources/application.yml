server:
  port: ${PORT:8080}

logging:
  level:
    com.nerdquiz.config.JwtAuthenticationFilter: DEBUG
    com.nerdquiz.config.JwtUtil: DEBUG

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:54322/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Keep each Cloud Run instance's footprint small; Supavisor handles the
      # shared pool in front of Postgres.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      data-source-properties:
        sslmode: ${DB_SSL_MODE:prefer}
        prepareThreshold: 0

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

